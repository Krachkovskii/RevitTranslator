name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - revit_version: R23
            dotnet_version: '8.0.x'
          - revit_version: R24
            dotnet_version: '8.0.x'
          - revit_version: R25
            dotnet_version: '8.0.x'
          - revit_version: R26
            dotnet_version: '8.0.x'
          - revit_version: R27
            dotnet_version: '10.0.x'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet_version }}

      - name: Restore
        run: dotnet restore -p:Configuration="Release ${{ matrix.revit_version }}"

      - name: Build Release
        run: dotnet build -c "Release ${{ matrix.revit_version }}" --no-restore

      - name: Run tests
        run: dotnet test RevitTranslator.Tests/RevitTranslator.Tests.csproj --no-restore
