name: Publish RevitTranslator.Revit.Core

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3)'
        required: true

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Build net48 output (Revit 2023/2024)
      - name: Build R23 (net48)
        run: >
          dotnet build RevitTranslator.Revit.Core/RevitTranslator.Revit.Core.csproj
          -c "Release R23"

      # Build net8.0-windows output and produce the base package (Revit 2025/2026)
      - name: Pack R25 (net8.0-windows)
        run: >
          dotnet pack RevitTranslator.Revit.Core/RevitTranslator.Revit.Core.csproj
          -c "Release R25"
          -p:PackageVersion=${{ inputs.version }}
          --output nupkg

      # Inject the net48 DLL into the package so consumers targeting R23/R24 are covered
      - name: Inject net48 DLL into package
        shell: pwsh
        run: |
          $nupkg  = (Get-Item nupkg/*.nupkg).FullName
          $net48Dll = Resolve-Path "RevitTranslator.Revit.Core/bin/Release R23/net48/RevitTranslator.Revit.Core.dll"

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($nupkg, 'Update')
          $entry  = $zip.CreateEntry("lib/net48/RevitTranslator.Revit.Core.dll")
          $stream = $entry.Open()
          $bytes  = [System.IO.File]::ReadAllBytes($net48Dll)
          $stream.Write($bytes, 0, $bytes.Length)
          $stream.Dispose()
          $zip.Dispose()

      - name: Push
        shell: pwsh
        run: |
          $pkg = (Get-Item nupkg/*.nupkg).FullName
          dotnet nuget push $pkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.NUGET_TOKEN }} --skip-duplicate
