# Step 2 of 2 — Run after publish-base.yml.
# Publishes Revit-version-specific packages. Version format: {revit_year}.{revit_minor}.{patch}
# Dependency order: publish-revit-core-abstractions must complete before publish-revit-core.
name: Publish Revit Packages

on:
  workflow_dispatch:
    inputs:
      revit_minor:
        description: 'Revit API minor version (e.g. 0, 3)'
        required: true
      patch:
        description: 'Package patch version (e.g. 1, 2)'
        required: true

jobs:
  publish-revit-core-abstractions:
    name: Publish RevitTranslator.Revit.Core.Abstractions (${{ matrix.config }})
    runs-on: windows-latest
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - config: R23
            revit_year: 2023
            dotnet_version: '8.0.x'
          - config: R24
            revit_year: 2024
            dotnet_version: '8.0.x'
          - config: R25
            revit_year: 2025
            dotnet_version: '8.0.x'
          - config: R26
            revit_year: 2026
            dotnet_version: '8.0.x'
          - config: R27
            revit_year: 2027
            dotnet_version: '10.0.x'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet_version }}

      - name: Pack ${{ matrix.config }}
        run: >
          dotnet pack RevitTranslator.Revit.Core.Abstractions/RevitTranslator.Revit.Core.Abstractions.csproj
          -c "Release ${{ matrix.config }}"
          -p:PackageVersion=${{ matrix.revit_year }}.${{ inputs.revit_minor }}.${{ inputs.patch }}
          --output nupkg

      - name: Push
        shell: pwsh
        run: |
          $pkg = (Get-Item nupkg/*.nupkg).FullName
          dotnet nuget push $pkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.NUGET_TOKEN }} --skip-duplicate

  publish-revit-core:
    name: Publish RevitTranslator.Revit.Core (${{ matrix.config }})
    runs-on: windows-latest
    permissions:
      packages: write
    needs: publish-revit-core-abstractions
    strategy:
      matrix:
        include:
          - config: R23
            revit_year: 2023
            dotnet_version: '8.0.x'
          - config: R24
            revit_year: 2024
            dotnet_version: '8.0.x'
          - config: R25
            revit_year: 2025
            dotnet_version: '8.0.x'
          - config: R26
            revit_year: 2026
            dotnet_version: '8.0.x'
          - config: R27
            revit_year: 2027
            dotnet_version: '10.0.x'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet_version }}

      - name: Add GitHub Packages NuGet source
        run: >
          dotnet nuget add source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --name github
          --username ${{ github.actor }}
          --password ${{ secrets.NUGET_TOKEN }}
          --store-password-in-clear-text

      - name: Pack ${{ matrix.config }}
        run: >
          dotnet pack RevitTranslator.Revit.Core/RevitTranslator.Revit.Core.csproj
          -c "Release ${{ matrix.config }}"
          -p:PackageVersion=${{ matrix.revit_year }}.${{ inputs.revit_minor }}.${{ inputs.patch }}
          -p:PackingRevitCore=true
          --output nupkg

      - name: Push
        shell: pwsh
        run: |
          $pkg = (Get-Item nupkg/*.nupkg).FullName
          dotnet nuget push $pkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.NUGET_TOKEN }} --skip-duplicate
