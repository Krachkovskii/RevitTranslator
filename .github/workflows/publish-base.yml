# Step 1 of 2 — Run before publish-revit.yml.
# Publishes framework-agnostic packages with a shared version number.
# Dependency order: publish-abstractions must complete before publish-translation-service.
name: Publish Base Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3)'
        required: true

jobs:
  publish-abstractions:
    name: Publish RevitTranslator.Abstractions
    runs-on: windows-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: >
          dotnet pack RevitTranslator.Abstractions/RevitTranslator.Abstractions.csproj
          -c Release
          -p:PackageVersion=${{ inputs.version }}
          --output nupkg

      - name: Push
        shell: pwsh
        run: |
          $pkg = (Get-Item nupkg/*.nupkg).FullName
          dotnet nuget push $pkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.NUGET_TOKEN }} --skip-duplicate

  publish-translation-service:
    name: Publish TranslationService
    runs-on: windows-latest
    permissions:
      packages: write
    needs: publish-abstractions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: >
          dotnet pack TranslationService/TranslationService.csproj
          -c Release
          -p:PackageVersion=${{ inputs.version }}
          --output nupkg

      - name: Push
        shell: pwsh
        run: |
          $pkg = (Get-Item nupkg/*.nupkg).FullName
          dotnet nuget push $pkg --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --api-key ${{ secrets.NUGET_TOKEN }} --skip-duplicate
